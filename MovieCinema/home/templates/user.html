{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieCinema : User Dashboard</title>
    <!-- Link To CSS-->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- fav Icon-->
    <link rel="fav icon" href="{% static 'img/favicon.png' %}" type="image/x-icon">
    <!--Box icon-->
    <link href='https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <!--   Header    -->
    <header>
        <div class="nav container">
            <a href="{% url 'home' %}" class="logo">
                Movie<span>Cinema</span>
            </a>
            <a href="{% url 'logout' %}" class="page-link" style="margin-left:auto;">
                <i class='bx bx-log-out'></i> Logout
            </a>
        </div>
    </header>

    <main class="page">
        <h1 class="page-title">Add <span>Movies</span></h1>
        <p class="page-subtitle">Fill in the details to publish a new title</p>

        <form class="form-card" action="{% url 'adddata' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Movie Title</label>
                <input type="text" id="title" name="TITLE" placeholder="e.g. Vikram Vedha (2022)" required>
            </div>
            <div class="form-group">
                <label for="description">Movie Description</label>
                <textarea id="description" name="DESCRIPTION" placeholder="Short synopsis of the movie"></textarea>
            </div>
            <div class="form-group">
                <label for="image">Poster Image Link</label>
                <input type="url" id="image" name="IMAGE" placeholder="https://...">
            </div>
            <button type="submit" class="btn-primary" value="Insert">Insert Movie</button>
        </form>
    </main>

    <div class="copyright">
        <p>&#169; MovieCinema All Right Reserved</p>
    </div>
</body>

</html>
